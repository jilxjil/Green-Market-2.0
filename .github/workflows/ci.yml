name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/green_market
          BETTER_AUTH_SECRET: ci-secret-ci-secret-ci-secret-ci-secret
          BETTER_AUTH_URL: http://localhost:3000
